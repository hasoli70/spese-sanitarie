<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Spese Sanitarie" />
<meta name="theme-color" content="#1a6b4a" />
<title>Spese Sanitarie</title>
<link rel="manifest" href="manifest.json" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;min-height:100vh}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:#fff;display:flex;flex-direction:column}
.header{background:#1a6b4a;color:white;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:18px;font-weight:600}
.header-sub{font-size:12px;opacity:0.8;margin-top:2px}
.settings-btn{background:rgba(255,255,255,0.2);border:none;color:white;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.content{flex:1;padding:16px;overflow-y:auto;padding-bottom:100px}
.login-screen{padding:48px 24px;display:flex;flex-direction:column;align-items:center;gap:20px;text-align:center}
.login-icon{width:96px;height:96px;background:#e8f5ee;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:48px}
.login-screen h2{font-size:24px;font-weight:700;color:#111}
.login-screen p{font-size:14px;color:#666;line-height:1.6}
.btn-dropbox{background:#0061ff;color:white;border:none;padding:16px 32px;border-radius:12px;font-size:16px;cursor:pointer;width:100%;font-weight:600;display:flex;align-items:center;justify-content:center;gap:10px}
.btn-dropbox:active{background:#0052d9}
.btn-danger{background:#fff0f0;color:#c0392b;border:1px solid #f5c6c6;padding:7px 10px;border-radius:8px;font-size:14px;cursor:pointer;flex-shrink:0}
.btn-hide{background:#f5f5f5;color:#666;border:1px solid #ddd;padding:7px 10px;border-radius:8px;font-size:14px;cursor:pointer;flex-shrink:0}
.card-actions{display:flex;flex-direction:column;gap:6px}
.empty-state{text-align:center;padding:60px 24px;color:#999}
.empty-icon{width:72px;height:72px;background:#f0f0f0;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:32px}
.receipt-list{display:flex;flex-direction:column;gap:12px}
.receipt-card{background:#fff;border:1px solid #eee;border-radius:14px;display:flex;align-items:center;gap:12px;padding:12px}
.receipt-thumb{width:60px;height:60px;border-radius:10px;background:#f0f0f0;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:24px}
.receipt-thumb img{width:100%;height:100%;object-fit:cover}
.receipt-info{flex:1;min-width:0}
.receipt-name{font-size:13px;font-weight:600;color:#111;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.receipt-date{font-size:12px;color:#888;margin-top:2px}
.receipt-status{font-size:11px;margin-top:4px;font-weight:500}
.status-ok{color:#1a6b4a}
.status-uploading{color:#888}
.status-error{color:#c0392b}
.fab-btn{position:fixed;bottom:28px;right:20px;width:64px;height:64px;background:#1a6b4a;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(26,107,74,0.45);z-index:50}
.fab-btn svg{width:28px;height:28px;color:white}
.toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);background:#1a6b4a;color:white;padding:12px 24px;border-radius:24px;font-size:14px;z-index:999;white-space:nowrap}
.toast.error{background:#c0392b}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(26,107,74,0.3);border-top-color:#1a6b4a;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}
.settings-panel{background:#f9f9f9;border-top:1px solid #eee;padding:16px 20px;display:flex;align-items:center;gap:12px}
.section-title{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px}
.loading-bar{height:3px;background:#e0f0e8;border-radius:2px;overflow:hidden;margin-bottom:16px}
.loading-bar-inner{height:100%;background:#1a6b4a;border-radius:2px;animation:loading 1.5s ease-in-out infinite}
@keyframes loading{0%{width:0%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}
.folder-row{display:flex;gap:8px;align-items:center;flex:1}
.folder-input{flex:1;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;color:#111;background:#f9f9f9}
.folder-save{background:#1a6b4a;color:white;border:none;padding:10px 16px;border-radius:8px;font-size:14px;cursor:pointer}
.user-info{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#e8f5ee;border-radius:10px;margin-bottom:16px}
.user-avatar{width:36px;height:36px;border-radius:50%;background:#1a6b4a;color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.user-name{font-size:14px;font-weight:600;color:#111}
.user-sub{font-size:12px;color:#666}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <div class="header-sub">Spese Sanitarie</div>
      <h1>Ricevute 🏥</h1>
    </div>
    <button class="settings-btn" id="settingsBtn" style="display:none">⚙️</button>
  </div>
  <div class="content">
    <div id="loginScreen" class="login-screen" style="display:none">
      <div class="login-icon">🏥</div>
      <h2>Spese Sanitarie</h2>
      <p>Fotografa e salva le ricevute sanitarie direttamente su Dropbox.</p>
      <button class="btn-dropbox" onclick="loginDropbox()">
        <svg width="20" height="20" viewBox="0 0 40 40" fill="white"><path d="M20 8L10 14.5L20 21L10 27.5L0 21L10 14.5L0 8L10 1.5L20 8ZM10 29.5L20 23L30 29.5L20 36L10 29.5ZM20 21L30 14.5L20 8L30 1.5L40 8L30 14.5L40 21L30 27.5L20 21Z"/></svg>
        Accedi con Dropbox
      </button>
      <p style="font-size:12px;color:#aaa">I tuoi dati rimangono privati</p>
    </div>
    <div id="mainScreen" style="display:none">
      <div id="userInfo" class="user-info" style="display:none">
        <div class="user-avatar" id="userAvatar">O</div>
        <div><div class="user-name" id="userName"></div><div class="user-sub" id="userEmail"></div></div>
      </div>
      <div id="loadingBar" class="loading-bar" style="display:none"><div class="loading-bar-inner"></div></div>
      <div class="section-title" id="listTitle">Le tue ricevute</div>
      <div id="receiptList" class="receipt-list"></div>
      <div id="emptyState" class="empty-state" style="display:none">
        <div class="empty-icon">🧾</div>
        <p style="font-weight:600;margin-bottom:8px;color:#333">Nessuna ricevuta</p>
        <p style="font-size:13px">Usa il pulsante fotocamera per aggiungere una ricevuta</p>
      </div>
    </div>
  </div>
  <div id="settingsPanel" class="settings-panel" style="display:none">
    <div class="folder-row">
      <input type="text" class="folder-input" id="folderInput" value="/Ricevute" />
      <button class="folder-save" onclick="saveFolder()">OK</button>
    </div>
    <button class="btn-danger" onclick="logout()">Esci</button>
  </div>
</div>

<button class="fab-btn" id="cameraBtn" style="display:none" onclick="document.getElementById('fileInput').click()">
  <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
  </svg>
</button>
<input type="file" accept="image/*" capture="environment" id="fileInput" style="display:none" onchange="handleFile(event)" />

<script>
const APP_KEY='o4uhth8m0cz03bq';
const REDIRECT_URI=location.origin+location.pathname;
let TOKEN='',FOLDER='/Ricevute',receipts=[],toastTimer;
const $=id=>document.getElementById(id);

async function sha256(plain){
  const data=new TextEncoder().encode(plain);
  const hash=await crypto.subtle.digest('SHA-256',data);
  return btoa(String.fromCharCode(...new Uint8Array(hash))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
function randomStr(n){const c='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';return Array.from(crypto.getRandomValues(new Uint8Array(n))).map(b=>c[b%c.length]).join('');}

async function loginDropbox(){
  const v=randomStr(64),ch=await sha256(v);
  sessionStorage.setItem('pkce_v',v);
  const p=new URLSearchParams({client_id:APP_KEY,response_type:'code',redirect_uri:REDIRECT_URI,code_challenge:ch,code_challenge_method:'S256',token_access_type:'offline',scope:'files.content.write files.content.read account_info.read'});
  location.href='https://www.dropbox.com/oauth2/authorize?'+p;
}

async function exchangeCode(code){
  const v=sessionStorage.getItem('pkce_v');
  if(!v)return;
  const res=await fetch('https://api.dropboxapi.com/oauth2/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({code,grant_type:'authorization_code',client_id:APP_KEY,redirect_uri:REDIRECT_URI,code_verifier:v})});
  if(!res.ok){showToast('Errore login',true);$('loginScreen').style.display='flex';return;}
  const d=await res.json();
  TOKEN=d.access_token;
  localStorage.setItem('dbx_at',TOKEN);
  if(d.refresh_token)localStorage.setItem('dbx_rt',d.refresh_token);
  sessionStorage.removeItem('pkce_v');
  history.replaceState({},'',REDIRECT_URI);
  showMain();
}

async function refreshToken(){
  const rt=localStorage.getItem('dbx_rt');
  if(!rt)return false;
  const res=await fetch('https://api.dropboxapi.com/oauth2/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({grant_type:'refresh_token',refresh_token:rt,client_id:APP_KEY})});
  if(!res.ok)return false;
  const d=await res.json();
  TOKEN=d.access_token;
  localStorage.setItem('dbx_at',TOKEN);
  return true;
}

function logout(){
  if(!confirm('Vuoi uscire?'))return;
  localStorage.clear();TOKEN='';receipts=[];
  $('mainScreen').style.display='none';$('loginScreen').style.display='flex';
  $('cameraBtn').style.display='none';$('settingsBtn').style.display='none';$('settingsPanel').style.display='none';
}

function saveFolder(){
  FOLDER=$('folderInput').value.trim()||'/Ricevute';
  localStorage.setItem('dbx_folder',FOLDER);
  showToast('✓ Cartella: '+FOLDER);
  $('settingsPanel').style.display='none';
  loadReceipts();
}

$('settingsBtn').onclick=()=>{const p=$('settingsPanel');p.style.display=p.style.display==='none'?'flex':'none';};

function showToast(msg,isError=false){
  let t=document.querySelector('.toast');if(t)t.remove();
  t=document.createElement('div');t.className='toast'+(isError?' error':'');t.textContent=msg;
  document.body.appendChild(t);clearTimeout(toastTimer);toastTimer=setTimeout(()=>{if(t.parentNode)t.remove();},3000);
}
function setLoading(on){$('loadingBar').style.display=on?'block':'none';}

async function getUserInfo(){
  try{
    const res=await fetch('https://api.dropboxapi.com/2/users/get_current_account',{method:'POST',headers:{'Authorization':'Bearer '+TOKEN}});
    if(!res.ok)return;
    const d=await res.json();
    const name=d.name?.display_name||'Utente';
    $('userName').textContent=name;$('userEmail').textContent=d.email||'';
    $('userAvatar').textContent=name.charAt(0).toUpperCase();$('userInfo').style.display='flex';
  }catch{}
}

function showMain(){
  $('loginScreen').style.display='none';$('mainScreen').style.display='block';
  $('cameraBtn').style.display='flex';$('settingsBtn').style.display='flex';
  FOLDER=localStorage.getItem('dbx_folder')||'/Ricevute';$('folderInput').value=FOLDER;
  getUserInfo();loadReceipts();
}

async function handleFile(e){
  const file=e.target.files[0];if(!file)return;e.target.value='';
  const ts=new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
  const ext=file.name.split('.').pop()||'jpg';
  await uploadFile(file,'ricevuta_'+ts+'.'+ext);
}

async function doUpload(buf,path){
  return fetch('https://content.dropboxapi.com/2/files/upload',{method:'POST',headers:{'Authorization':'Bearer '+TOKEN,'Dropbox-API-Arg':JSON.stringify({path,mode:'add',autorename:true,mute:false}),'Content-Type':'application/octet-stream'},body:buf});
}

async function uploadFile(file,name){
  const path=FOLDER+'/'+name,id='local_'+Date.now();
  receipts.unshift({id,name,path,status:'uploading',url:URL.createObjectURL(file),date:new Date()});
  renderList();setLoading(true);
  try{
    const buf=await file.arrayBuffer();
    let res=await doUpload(buf,path);
    if(res.status===401){const ok=await refreshToken();if(!ok){logout();return;}res=await doUpload(buf,path);}
    if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.error_summary||'Errore '+res.status);}
    const d=await res.json();
    const r=receipts.find(x=>x.id===id);if(r){r.status='ok';r.path=d.path_display;r.id=d.id||id;}
    showToast('✓ Ricevuta salvata!');
  }catch(err){const r=receipts.find(x=>x.id===id);if(r)r.status='error';showToast('Errore: '+err.message,true);}
  setLoading(false);renderList();
}

async function loadReceipts(){
  setLoading(true);
  try{
    const res=await fetch('https://api.dropboxapi.com/2/files/list_folder',{method:'POST',headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify({path:FOLDER,limit:100})});
    if(res.status===409){receipts=[];renderList();setLoading(false);return;}
    if(res.status===401){const ok=await refreshToken();if(ok){loadReceipts();return;}logout();return;}
    if(!res.ok)throw new Error('Errore '+res.status);
    const d=await res.json();
    receipts=d.entries.filter(e=>e['.tag']==='file'&&/\.(jpg|jpeg|png|gif|webp)$/i.test(e.name)).map(e=>({id:e.id,name:e.name,path:e.path_display,status:'ok',url:null,date:new Date(e.server_modified)})).sort((a,b)=>b.date-a.date);
    renderList();receipts.slice(0,10).forEach(r=>loadThumb(r));
  }catch(err){showToast('Errore: '+err.message,true);}
  setLoading(false);
}

async function loadThumb(r){
  try{
    const res=await fetch('https://content.dropboxapi.com/2/files/get_thumbnail',{method:'POST',headers:{'Authorization':'Bearer '+TOKEN,'Dropbox-API-Arg':JSON.stringify({path:r.path,format:'jpeg',size:'w128h128'})}});
    if(!res.ok)return;
    r.url=URL.createObjectURL(await res.blob());
    const img=document.querySelector('[data-thumb="'+r.id+'"]');
    if(img){img.src=r.url;img.style.display='block';const icon=img.previousElementSibling;if(icon)icon.style.display='none';}
  }catch{}
}

window.hideReceipt=function(rid){receipts=receipts.filter(x=>x.id!=rid);renderList();showToast('👁 Nascosta (resta su Dropbox)');};
window.deleteReceipt=async function(rid){
  const r=receipts.find(x=>x.id==rid);
  if(!r||!confirm('Eliminare "'+r.name+'" da Dropbox?'))return;
  try{
    setLoading(true);
    const res=await fetch('https://api.dropboxapi.com/2/files/delete_v2',{method:'POST',headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify({path:r.path})});
    if(!res.ok)throw new Error('Errore');
    receipts=receipts.filter(x=>x.id!=rid);renderList();showToast('🗑 Eliminata da Dropbox');
  }catch(err){showToast('Errore: '+err.message,true);}
  setLoading(false);
};

function renderList(){
  const list=$('receiptList'),empty=$('emptyState'),title=$('listTitle');
  if(receipts.length===0){list.innerHTML='';empty.style.display='block';title.textContent='Le tue ricevute';return;}
  empty.style.display='none';
  title.textContent=receipts.length+' ricevut'+(receipts.length===1?'a':'e');
  list.innerHTML=receipts.map(r=>`
    <div class="receipt-card">
      <div class="receipt-thumb">
        <span style="font-size:24px;${r.url?'display:none':''}">🧾</span>
        <img data-thumb="${r.id}" src="${r.url||''}" alt="" style="display:${r.url?'block':'none'};" />
      </div>
      <div class="receipt-info">
        <div class="receipt-name">${r.name}</div>
        <div class="receipt-date">${r.date.toLocaleDateString('it-IT',{day:'2-digit',month:'long',year:'numeric'})}</div>
        <div class="receipt-status ${r.status==='ok'?'status-ok':r.status==='uploading'?'status-uploading':'status-error'}">
          ${r.status==='ok'?'✓ Salvata su Dropbox':r.status==='uploading'?'<span class="spinner"></span> Caricamento...':'✗ Errore'}
        </div>
      </div>
      ${r.status!=='uploading'?`<div class="card-actions">
        <button class="btn-hide" onclick="hideReceipt('${r.id}')">👁</button>
        <button class="btn-danger" onclick="deleteReceipt('${r.id}')">🗑</button>
      </div>`:''}
    </div>`).join('');
}

async function init(){
  if('serviceWorker'in navigator)navigator.serviceWorker.getRegistrations().then(r=>r.forEach(sw=>sw.unregister()));
  const code=new URLSearchParams(location.search).get('code');
  if(code){await exchangeCode(code);return;}
  TOKEN=localStorage.getItem('dbx_at')||'';
  if(TOKEN){showMain();}else{$('loginScreen').style.display='flex';}
}
init();
</script>
</body>
</html>
